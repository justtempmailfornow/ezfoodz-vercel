<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZFOODZ — Restaurant Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ==================== LOGIN ==================== -->
<div class="login-container" id="loginPage">
    <div class="login-card">
        <div class="logo">
            <h1>EZFOODZ</h1>
            <p>Restaurant Manager Dashboard</p>
        </div>
        <div class="form-group">
            <label>Restaurant Email</label>
            <input type="email" id="loginEmail" placeholder="e.g. rfcssn@ssncanteen.in">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password">
        </div>
        <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
        <div class="error-msg" id="loginError"></div>
    </div>
</div>

<!-- ==================== DASHBOARD ==================== -->
<div class="dashboard" id="dashboardPage">
    <!-- Header -->
    <div class="dashboard-header">
        <div class="header-left">
            <h1>EZFOODZ</h1>
            <span class="restaurant-name-header" id="headerRestName">—</span>
            <span class="status-badge" id="headerStatus">
                <span class="status-dot"></span>
                <span id="headerStatusText">OPEN</span>
            </span>
            <button class="toggle-btn" id="toggleBtn" onclick="toggleOpenClose()">Close</button>
        </div>
        <div class="header-right">
            <button class="logout-btn" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <!-- Nav -->
    <div class="nav-bar">
        <button class="nav-tab active" data-section="items" onclick="switchTab(this)">📦 Items in Stock</button>
        <button class="nav-tab" data-section="addItem" onclick="switchTab(this)">➕ Add Item</button>
        <button class="nav-tab" data-section="details" onclick="switchTab(this)">🏪 Restaurant Details</button>
        <button class="nav-tab" data-section="orders" onclick="switchTab(this)">🔔 Current Orders</button>
        <button class="nav-tab" data-section="history" onclick="switchTab(this)">📋 Order History</button>
    </div>

    <!-- Content -->
    <div class="content">

        <!-- ===== ITEMS IN STOCK ===== -->
        <div class="section active" id="sec-items">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h2 class="section-title" style="margin-bottom:0;">Items in Stock</h2>
                <button class="btn btn-green btn-sm" onclick="switchTab(document.querySelector('[data-section=addItem]'))">+ Add New Item</button>
            </div>
            <div id="itemsList"></div>
        </div>

        <!-- ===== ADD / EDIT ITEM ===== -->
        <div class="section" id="sec-addItem">
            <h2 class="section-title" id="addItemTitle">Add New Item</h2>
            <div class="form-card">
                <input type="hidden" id="editItemId" value="">
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" id="itemName" placeholder="e.g. Chicken Biryani">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <div class="radio-group" id="categoryGroup">
                        <label class="radio-option selected" onclick="selectRadio(this,'category')">
                            <input type="radio" name="category" value="veg" checked>
                            <span style="color:var(--green);">●</span> Veg
                        </label>
                        <label class="radio-option" onclick="selectRadio(this,'category')">
                            <input type="radio" name="category" value="non-veg">
                            <span style="color:var(--red);">●</span> Non-Veg
                        </label>
                        <label class="radio-option" onclick="selectRadio(this,'category')">
                            <input type="radio" name="category" value="stationary">
                            <span style="color:var(--blue);">●</span> Stationary
                        </label>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Cuisine</label>
                        <input type="text" id="itemCuisine" placeholder="e.g. South Indian">
                    </div>
                    <div class="form-group">
                        <label>Price (₹)</label>
                        <input type="number" id="itemPrice" placeholder="e.g. 120" min="1">
                    </div>
                </div>
                <div style="display:flex; gap:12px; margin-top:8px;">
                    <button class="btn btn-primary" style="flex:1;" onclick="saveItem()">Save Item</button>
                    <button class="btn btn-outline" onclick="cancelEdit()">Cancel</button>
                </div>
            </div>
        </div>

        <!-- ===== RESTAURANT DETAILS ===== -->
        <div class="section" id="sec-details">
            <h2 class="section-title">Restaurant Details</h2>
            <div class="form-card" style="max-width:700px;">
                <div class="details-grid">
                    <div class="form-group">
                        <label>Restaurant Name</label>
                        <input type="text" id="detailName">
                    </div>
                    <div class="form-group">
                        <label>Cuisine Type</label>
                        <input type="text" id="detailCuisine">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="detailPhone">
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="detailAddress">
                    </div>
                    <div class="form-group" style="grid-column:1/-1;">
                        <label>Description</label>
                        <textarea id="detailDescription" rows="3"></textarea>
                    </div>
                </div>
                <div class="form-group" style="margin-top:20px;">
                    <label>Restaurant Image</label>
                    <div class="image-upload-area" id="imageUploadArea">
                        <img id="restaurantImage" src="" style="display:none;">
                        <p id="imageUploadText">Click or drag to upload image</p>
                        <input type="file" id="imageInput" accept="image/*" onchange="uploadImage(event)">
                    </div>
                </div>
                <button class="btn btn-primary" style="margin-top:16px;" onclick="saveDetails()">Save Details</button>
            </div>
        </div>

        <!-- ===== CURRENT ORDERS ===== -->
        <div class="section" id="sec-orders">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h2 class="section-title" style="margin-bottom:0;">Current Orders</h2>
                <span style="font-size:13px; color:var(--text-muted);">Auto-refreshes every 5s</span>
            </div>
            <div id="ordersList"></div>
        </div>

        <!-- ===== ORDER HISTORY ===== -->
        <div class="section" id="sec-history">
            <h2 class="section-title">Order History</h2>
            <div id="historyList"></div>
        </div>
    </div>
</div>

<!-- ==================== EDIT ITEM MODAL ==================== -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-header">
            <h2>Edit Item</h2>
            <button class="modal-close" onclick="closeEditModal()">✕</button>
        </div>
        <div class="form-group">
            <label>Item Name</label>
            <input type="text" id="modalItemName">
        </div>
        <div class="form-group">
            <label>Category</label>
            <select id="modalItemCategory">
                <option value="veg">Veg</option>
                <option value="non-veg">Non-Veg</option>
                <option value="stationary">Stationary</option>
            </select>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Cuisine</label>
                <input type="text" id="modalItemCuisine">
            </div>
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" id="modalItemPrice" min="1">
            </div>
        </div>
        <input type="hidden" id="modalItemId">
        <button class="btn btn-primary" style="margin-top:12px;" onclick="saveEditModal()">Update Item</button>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
    <span id="toastMsg"></span>
</div>

<script src="app.js"></script>
</body>
</html>
